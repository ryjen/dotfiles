---
- name: Ensure Plano config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ plano_config_dir }}"
    - "{{ plano_bin_dir }}"
    - "{{ plano_state_dir }}"
    - "{{ plano_cache_dir }}"
  when: install_state == "present"

- name: Ensure model-router config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ model_router_config_dir }}"
    - "{{ model_router_profile_dir }}"
    - "{{ model_router_state_dir }}"
    - "{{ model_router_cache_dir }}"
  when:
    - install_state == "present"
    - model_router_enabled | bool

- name: Install Plano CLI with uv tool
  ansible.builtin.command: "uv tool install {{ plano_package }}"
  register: plano_uv_install
  changed_when: plano_uv_install.rc == 0 and ('Installed' in plano_uv_install.stdout or 'Updated' in plano_uv_install.stdout)
  failed_when: plano_uv_install.rc != 0 and 'already installed' not in plano_uv_install.stderr
  when:
    - install_state == "present"
    - plano_install_cli | bool

- name: Write Plano Dubnium config
  ansible.builtin.template:
    src: dubnium.yaml.j2
    dest: "{{ plano_config_file }}"
    mode: "0600"
  when: install_state == "present"

- name: Write model-router local-first profile
  ansible.builtin.template:
    src: model-router-local-first-dev.yaml.j2
    dest: "{{ model_router_profile_file }}"
    mode: "0600"
  when:
    - install_state == "present"
    - model_router_enabled | bool

- name: Write plano-dubnium helper
  ansible.builtin.template:
    src: plano-dubnium.j2
    dest: "{{ plano_bin_dir }}/plano-dubnium"
    mode: "0755"
  when: install_state == "present"

- name: Write model-router environment helper
  ansible.builtin.template:
    src: model-router-env.j2
    dest: "{{ plano_bin_dir }}/model-router-env"
    mode: "0755"
  when:
    - install_state == "present"
    - model_router_enabled | bool

- name: Remove model-router environment helper
  ansible.builtin.file:
    path: "{{ plano_bin_dir }}/model-router-env"
    state: absent
  when: install_state == "absent"

- name: Remove plano-dubnium helper
  ansible.builtin.file:
    path: "{{ plano_bin_dir }}/plano-dubnium"
    state: absent
  when: install_state == "absent"

- name: Remove model-router local-first profile
  ansible.builtin.file:
    path: "{{ model_router_profile_file }}"
    state: absent
  when: install_state == "absent"

- name: Remove Plano Dubnium config
  ansible.builtin.file:
    path: "{{ plano_config_file }}"
    state: absent
  when: install_state == "absent"
