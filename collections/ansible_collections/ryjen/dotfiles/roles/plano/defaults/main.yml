---
# User-level Plano integration. Dubnium owns system packages/services;
# this role owns user config, helper scripts, and optional CLI bootstrap.

plano_install_cli: true
plano_package: planoai
plano_config_dir: "{{ ansible_facts['env']['HOME'] }}/.config/planoai"
plano_config_file: "{{ plano_config_dir }}/dubnium.yaml"
plano_bin_dir: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
plano_state_dir: "{{ ansible_facts['env']['HOME'] }}/.local/state/planoai"
plano_cache_dir: "{{ ansible_facts['env']['HOME'] }}/.cache/planoai"

plano_listener_name: egress_traffic
plano_listener_address: 127.0.0.1
plano_listener_port: 12000
plano_listener_timeout: 120s

# OpenAI-compatible local endpoint. On Dubnium this should normally point at vLLM.
plano_local_model: openai/qwen2.5-coder-14b-instruct
plano_local_access_key: EMPTY
plano_local_base_url: http://127.0.0.1:8000/v1
plano_enable_local_provider: true

# Optional cloud providers. Keep secrets in env/vault, not in repo.
plano_enable_openai_provider: false
plano_openai_model: openai/gpt-4o-mini
plano_openai_access_key: "$OPENAI_API_KEY"

plano_enable_anthropic_provider: false
plano_anthropic_model: anthropic/claude-3-5-sonnet
plano_anthropic_access_key: "$ANTHROPIC_API_KEY"

plano_model_aliases:
  local-code:
    target: qwen2.5-coder-14b-instruct
  fast-local:
    target: qwen2.5-coder-14b-instruct

plano_routing_preferences:
  - name: local code work
    description: code understanding, code generation, refactoring, and repo analysis that should prefer local inference
    models:
      - "{{ plano_local_model }}"

# model-router is intentionally user-level here. It owns local routing policy,
# profile selection, and ledger paths. Plano remains the runtime gateway.
model_router_enabled: true
model_router_config_dir: "{{ ansible_facts['env']['HOME'] }}/.config/model-router"
model_router_profile_dir: "{{ model_router_config_dir }}/profiles"
model_router_profile_name: local-first-dev
model_router_profile_file: "{{ model_router_profile_dir }}/{{ model_router_profile_name }}.yaml"
model_router_state_dir: "{{ ansible_facts['env']['HOME'] }}/.local/state/model-router"
model_router_cache_dir: "{{ ansible_facts['env']['HOME'] }}/.cache/model-router"
model_router_ledger_file: "{{ model_router_state_dir }}/route-decisions.jsonl"
model_router_plano_base_url: "http://{{ plano_listener_address }}:{{ plano_listener_port }}"
model_router_openai_base_url: "{{ model_router_plano_base_url }}/v1"

model_router_sources:
  - id: dubnium-local-code
    provider: plano
    plano_alias: local-code
    privacy_boundary: local
    cost_class: free
    capabilities:
      - code
      - summarize
      - rewrite
      - classify
    context_tokens: 32768
  - id: dubnium-fast-local
    provider: plano
    plano_alias: fast-local
    privacy_boundary: local
    cost_class: free
    capabilities:
      - summarize
      - rewrite
      - classify
    context_tokens: 32768

model_router_privacy_classes:
  local_only:
    description: Secrets, private source code, unpublished documents, and sensitive personal data
    allowed_boundaries:
      - local
  trusted_cloud_ok:
    description: Work content allowed for explicitly approved cloud providers
    allowed_boundaries:
      - local
      - trusted_cloud
  public_cloud_ok:
    description: Public-safe content
    allowed_boundaries:
      - local
      - trusted_cloud
      - public_cloud

model_router_rules:
  - id: private-code-local-only
    description: Private code and unpublished docs must stay on local routing surfaces
    when:
      data_class:
        - source_code
        - secrets
        - unpublished_docs
        - sensitive_personal_data
    effect: require_local
  - id: public-cheap-work-prefer-free
    description: Public summarize/rewrite/classify tasks should prefer free/local routes
    when:
      privacy_class:
        - public_cloud_ok
      task:
        - summarize
        - rewrite
        - classify
    effect: prefer
    parameters:
      cost_class:
        - free
        - low

model_router_fallback_allowed_reasons:
  - timeout
  - rate_limited
  - provider_5xx
  - transient_network_failure
  - invalid_structured_output_after_retry

model_router_fallback_forbidden_reasons:
  - privacy_violation
  - forbidden_provider
  - budget_hard_limit
  - safety_policy_denial
  - missing_approval_gate
