---
- hosts: localhost
  remote_user: root
  vars_files:
    - vars.yml
  roles:
    - mcp
  tasks:
    - name: Check docker binary
      command:
        argv:
          - command
          - -v
          - docker
      register: mcp_docker_cmd
      changed_when: false
      failed_when: false

    - name: Verify MCP docker context
      command:
        argv:
          - docker
          - context
          - inspect
          - "{{ mcp_docker_context_name | default('mcp') }}"
      register: mcp_docker_context
      changed_when: false
      when: mcp_docker_cmd.rc == 0

    - name: Assert MCP docker context exists
      assert:
        that:
          - mcp_docker_context.rc == 0
      when: mcp_docker_cmd.rc == 0

    - name: Check MCP docker-compose config
      stat:
        path: "{{ mcp_install_path }}/docker-compose.yml"
      register: mcp_compose_stat

    - name: Check MCP gateway config
      stat:
        path: "{{ mcp_install_path }}/gateway.yml"
      register: mcp_gateway_stat

    - name: Assert MCP configs are present
      assert:
        that:
          - mcp_compose_stat.stat.exists
          - mcp_gateway_stat.stat.exists
      when: install_state == "present"

    - name: Assert MCP configs are absent
      assert:
        that:
          - not mcp_compose_stat.stat.exists
          - not mcp_gateway_stat.stat.exists
      when: install_state == "absent"

    - block:
        - name: Read MCP docker-compose config
          slurp:
            src: "{{ mcp_install_path }}/docker-compose.yml"
          register: mcp_compose_slurp
          when: mcp_compose_stat.stat.exists

        - name: Assert MCP docker-compose includes gateway
          assert:
            that:
              - "(mcp_compose_slurp.content | b64decode) is search('mcp-gateway:')"
          when: mcp_compose_stat.stat.exists

        - name: Assert MCP docker-compose uses local gateway config path
          assert:
            that:
              - >-
                (mcp_compose_slurp.content | b64decode
                | regex_search('{{ mcp_install_path }}/gateway.yml:/app/gateway.yml')) is not none
          when: mcp_compose_stat.stat.exists
      when: install_state == "present"

    - name: Check MCP systemd unit
      stat:
        path: /etc/systemd/system/mcp.service
      register: mcp_service_stat

    - name: Assert MCP systemd unit is present
      assert:
        that:
          - mcp_service_stat.stat.exists
          - mcp_service_stat.stat.mode == "0644"
      when: install_state == "present"

    - name: Assert MCP systemd unit is absent
      assert:
        that:
          - not mcp_service_stat.stat.exists
      when: install_state == "absent"

    - block:
        - name: Read MCP gateway config
          slurp:
            src: "{{ mcp_install_path }}/gateway.yml"
          register: mcp_gateway_slurp
          when: mcp_gateway_stat.stat.exists

        - name: Assert MCP gateway binds to loopback
          assert:
            that:
              - "(mcp_gateway_slurp.content | b64decode) is search('host: 127.0.0.1')"
          when: mcp_gateway_stat.stat.exists

        - name: Read MCP systemd unit
          slurp:
            src: /etc/systemd/system/mcp.service
          register: mcp_service_slurp
          when: mcp_service_stat.stat.exists

        - name: Assert MCP systemd unit uses docker compose
          assert:
            that:
              - "(mcp_service_slurp.content | b64decode) is search('docker compose up -d')"
              - "(mcp_service_slurp.content | b64decode) is search('docker compose down')"
          when: mcp_service_stat.stat.exists
      when: install_state == "present"
