---
- hosts: localhost
  remote_user: root
  vars_files:
    - vars.yml
  roles:
    - mcp
  tasks:
    - name: Check docker binary
      command:
        argv:
          - command
          - -v
          - docker
      register: mcp_docker_cmd
      changed_when: false
      failed_when: false

    - name: Verify MCP docker context
      command:
        argv:
          - docker
          - context
          - inspect
          - "{{ mcp_docker_context_name | default('mcp') }}"
      register: mcp_docker_context
      changed_when: false
      when: mcp_docker_cmd.rc == 0

    - name: Assert MCP docker context exists
      assert:
        that:
          - mcp_docker_context.rc == 0
      when: mcp_docker_cmd.rc == 0

    - name: Check MCP docker-compose config
      stat:
        path: "{{ mcp_install_path }}/docker-compose.yml"
      register: mcp_compose_stat

    - name: Check MCP gateway config
      stat:
        path: "{{ mcp_install_path }}/gateway.yml"
      register: mcp_gateway_stat

    - name: Assert MCP configs are present
      assert:
        that:
          - mcp_compose_stat.stat.exists
          - mcp_gateway_stat.stat.exists
      when: install_state == "present"

    - name: Assert MCP configs are absent
      assert:
        that:
          - not mcp_compose_stat.stat.exists
          - not mcp_gateway_stat.stat.exists
      when: install_state == "absent"

    - block:
      - name: Read MCP docker-compose config
        slurp:
          src: "{{ mcp_install_path }}/docker-compose.yml"
        register: mcp_compose_slurp
        when: mcp_compose_stat.stat.exists

      - name: Assert MCP docker-compose includes gateway
        assert:
          that:
            - "'mcp-gateway:' in (mcp_compose_slurp.content | b64decode)"
        when: mcp_compose_stat.stat.exists
      when: install_state == "present"

    - name: Check MCP systemd unit
      stat:
        path: /etc/systemd/system/mcp.service
      register: mcp_service_stat

    - name: Assert MCP systemd unit is present
      assert:
        that:
          - mcp_service_stat.stat.exists
          - mcp_service_stat.stat.mode == "0644"
