version: 1

gateway:
  listen:
    host: 0.0.0.0
    port: 7999

profiles:
  active:
    - ai-tools
    - all
    - automation
    - dev
    - infra
    - mobile
    - research
    - security

servers:
  skillz:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "skillz"
      - "uvx"
      - "skillz"
  sequential-thinking:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "sequential-thinking"
      - "node"
      - "dist/index.js"
  memory-bank:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "memory-bank"
      - "npx"
      - "-y"
      - "@allpepper/memory-bank-mcp"
  conventional-commits:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "conventional-commits"
      - "uvx"
      - "mcp-git-commit-generator"
  mobile-mcp:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "mobile-mcp"
      - "npx"
      - "-y"
      - "@mobilenext/mobile-mcp@latest"
  filesystem:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "filesystem"
      - "node"
      - "/app/dist/index.js"
      - "/workspace"
  playwright:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "playwright"
      - "node"
      - "cli.js"
      - "--headless"
      - "--browser"
      - "chromium"
      - "--no-sandbox"
  sqlite:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "sqlite"
      - "mcp-server-sqlite"
  n8n:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "n8n"
      - "node"
      - "dist/mcp/index.js"
  kubernetes:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "kubernetes"
      - "node"
      - "dist/index.js"
  arxiv:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "arxiv"
      - "arxiv-mcp-server"
  local-rag:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "local-rag"
      - "uvx"
      - "git+https://github.com/nkapila6/mcp-local-rag"
      - "local-rag"
  sysoperator:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "sysoperator"
      - "npx"
      - "-y"
      - "@iflow-mcp/mcp-sysoperator"
  user-feedback:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "user-feedback"
      - "uvx"
      - "git+https://github.com/mrexodia/user-feedback-mcp"
      - "server.py"
  language-server:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "language-server"
      - "go"
      - "run"
      - "github.com/isaacphi/mcp-language-server@latest"
      - "--workspace"
      - "/app"
  editor-config:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "editor-config"
      - "npx"
      - "-y"
      - "editorconfig-mcp-server"
  fetch:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "fetch"
      - "npx"
      - "-y"
      - "mcp-fetch-server"
  src-to-kb:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "src-to-kb"
      - "npx"
      - "-y"
      - "@vezlo/src-to-kb"
      - "mcp"
  pandoc:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "pandoc"
      - "uvx"
      - "mcp-pandoc"
  piloty:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "piloty"
      - "uvx"
      - "git+https://github.com/yiwenlu66/PiloTY"
      - "piloty"
  kaggle:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "kaggle"
      - "uvx"
      - "--from"
      - "git+https://github.com/54yyyu/kaggle-mcp"
      - "kaggle-mcp"
  context-awesome:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "context-awesome"
      - "npx"
      - "-y"
      - "https://github.com/bh-rat/context-awesome"
  ghidra:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "ghidra"
      - "uvx"
      - "--from"
      - "git+https://github.com/LaurieWired/GhidraMCP"
      - "bridge_mcp_ghidra.py"
      - "--transport"
      - "sse"
      - "--ghidra-server"
      - "http://127.0.0.1:8080/"
  scan:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "scan"
      - "uvx"
      - "git+https://github.com/invariantlabs-ai/mcp-scan"
      - "mcp-scan"
  calculator:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "calculator"
      - "go"
      - "run"
      - "github.com/avisangle/calculator-server@latest"
  investor-agent:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "investor-agent"
      - "uvx"
      - "git+https://github.com/ferdousbhai/investor-agent"
      - "investor-agent"
  token-optimizer-mcp:
    transport: stdio
    command:
      - "docker"
      - "exec"
      - "-i"
      - "token-optimizer-mcp"
      - "npx"
      - "-y"
      - "token-optimizer-mcp"
