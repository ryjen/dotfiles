---
- hosts: localhost
  tasks:
    - name: Read starship role tasks
      slurp:
        src: "{{ playbook_dir }}/../tasks/main.yml"
      register: starship_tasks

    - name: Assert starship uninstall command quoting
      assert:
        that:
          - >-
            (starship_tasks.content | b64decode
            | regex_search('rm -f \"\\$\\(command -v starship\\)\"')) is not none

    - name: Assert starship uninstall ignores missing binary
      assert:
        that:
          - >-
            (starship_tasks.content | b64decode
            | regex_search('failed_when:\\s*false')) is not none
