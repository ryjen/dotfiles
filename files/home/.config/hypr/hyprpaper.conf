# Managed Hyprpaper config for the Dubnium workstation.
#
# Wallpapers are installed by Home Manager under ~/Pictures/wallpaper/defaults.
# User-provided wallpapers can be placed anywhere below ~/Pictures/wallpaper
# and will be included by recursive directory scanning.

splash = false
ipc = true

wallpaper {
    monitor =
    path = ~/Pictures/wallpaper
    fit_mode = cover
    timeout = 900
    order = random
    recursive = true
}
