# Adopted from technetium ~/.config/hypr/hyprland.conf.

# --- MONITORS ---
monitor=eDP-1, 1920x1200@60, 0x0, 1.33

# Force correct environment variables
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24

# Push these to systemd/dbus immediately
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprctl setcursor Adwaita 24

# --- SMART GAPS ---
workspace = w[tv1], gapsout:0, gapsin:0, border:0, rounding:0
workspace = f[1], gapsout:0, gapsin:0, border:0, rounding:0

# --- Window Rules (v0.53+ Syntax) ---
windowrule {
    name = system-monitors
    match:title = ^(btop)$
    float = on
    center = on
    size = 1000 600
}

windowrule {
    name = popups
    match:class = ^(pavucontrol)$
    float = on
    center = on
}

windowrule {
    name = network-manager
    match:class = ^(nm-connection-editor)$
    float = on
    center = on
}

windowrule {
    name = waybar-logic
    match:class = ^(waybar)$
    no_blur = on
}

windowrule {
    name = terminal-blur
    match:class = ^(kitty)$
    opacity = 0.9
}

windowrule {
    name = browser-pip
    match:title = ^(Picture-in-Picture)$
    float = on
    pin = on
    size = 480 270
    move = 1430 920
}

windowrule {
    name = dolphin-popups
    match:class = ^(org.kde.dolphin)$
    match:title = ^(Copying — Dolphin)$
    float = on
}

windowrule {
    name = system-dialogues
    match:class = ^(xdg-desktop-portal-gtk)$
    float = on
    center = on
}

windowrule {
    name = dev-home
    match:class = ^(code-url-handler)$
    workspace = 3
}

windowrule {
    name = web-home
    match:class = ^(firefox)$
    workspace = 2
}

windowrule {
    name = xwayland-fix
    match:xwayland = on
    no_blur = on
}

windowrule {
    name = wofi-spotlight
    match:class = ^(wofi)$
    float = on
    center = on
    size = 600 400
    pin = on
    no_blur = off
    no_shadow = off
}

windowrule = focus_on_activate on, match:class ^(wofi)$

# --- INPUT ---
input {
    kb_layout = us,us
    kb_variant = colemak,
    kb_options = grp:shifts_toggle,caps:escape

    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
        middle_button_emulation = true
    }
    sensitivity = 0
}

device {
    name = tpps/2-elan-trackpoint
    sensitivity = 0.5
    accel_profile = flat
}

# --- AESTHETICS ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 10
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }
}

# --- GESTURES ---
gestures {
    gesture = 3, horizontal, workspace
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
}

dwindle {
    preserve_split = true
    split_width_multiplier = 1.2
}

# --- KEYBINDS ---
$mainMod = SUPER

bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, dolphin
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, wofi --show drun --style ~/.config/wofi/style.css --conf ~/.config/wofi/config
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# --- THINKPAD FUNCTION KEYS ---
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Power & Travel
bind = $mainMod SHIFT, B, exec, sudo tee /sys/class/power_supply/BAT0/charge_control_end_threshold <<< 100 && brightnessctl set 30%

# Reload Waybar
bind = $mainMod SHIFT, R, exec, killall waybar && waybar &

# Random Wallpaper
bind = $mainMod, F5, exec, ~/.local/bin/random-wallpaper

# Print Screen
bind = , Print, exec, grim ~/Pictures/screenshots/$(date +%s).png
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshots/$(date +%s).png
bind = CTRL SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy

# --- AUTOSTART ---
exec-once = uwsm app -- waybar
#exec-once = uwsm app -- swww-daemon
#exec-once = uwsm app -- waypaper --restore
exec-once = uwsm app -- nm-applet --indicator
exec-once = uwsm app -- gammastep -l 45.4:-75.6 -t 6500:3500
exec-once = uwsm app -- mako
exec-once = hyprpaper
exec-once = uwsm app -- ~/.local/bin/random-wallpaper
exec-once = eww daemon
exec-once = uwsm app -- eww open quote_overlay
exec-once = uwsm app -- ~/.local/bin/random-quote
